name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (offline-capable extras + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[faiss,ma_rag,dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build & check distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
